<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prova Bíblica Dissertativa</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --line-color: #000; }
        body { font-family: 'Times New Roman', Times, serif; background: #525659; margin: 0; padding: 20px; }
        
        .prova-folha { 
            background: white; width: 210mm; min-height: 297mm; 
            margin: auto; padding: 20mm; box-sizing: border-box; 
            box-shadow: 0 0 10px rgba(0,0,0,0.5); position: relative;
        }

        /* Cabeçalho Funcional */
        .cabecalho { border: 2px solid #000; padding: 15px; margin-bottom: 30px; }
        .cabecalho table { width: 100%; border-collapse: collapse; }
        .cabecalho td { padding: 8px; border-bottom: 1px solid #ccc; }
        
        input[type="text"], input[type="date"] {
            border: none; border-bottom: 1px solid transparent;
            font-family: 'Times New Roman', serif; font-size: 12pt;
            width: 80%; outline: none; background: #f9f9f9;
        }
        input:focus { background: #fffde7; border-bottom: 1px solid #000; }

        h2 { text-align: center; text-transform: uppercase; margin-bottom: 30px; text-decoration: underline; }
        
        .questao { margin-bottom: 25px; page-break-inside: avoid; }
        .pergunta-titulo { font-weight: bold; font-size: 13pt; display: block; margin-bottom: 10px; }
        
        .item-box { margin-left: 20px; margin-bottom: 15px; }
        .item-label { display: block; margin-bottom: 5px; font-style: italic; }
        
        textarea { 
            width: 100%; border: none; border-bottom: 1px dotted #000; 
            resize: none; font-family: 'Times New Roman', serif; font-size: 12pt;
            line-height: 1.6; outline: none; overflow: hidden;
        }

        #resultado-final { 
            display: none; border: 4px double #000; padding: 20px; 
            text-align: center; margin-top: 30px; background: #f4f4f4;
        }

        .no-print-area { 
            position: fixed; bottom: 30px; right: 30px; display: flex; gap: 10px; 
        }

        .btn {
            background: #2c3e50; color: white; border: none; padding: 15px 25px;
            border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .btn-save { background: #27ae60; }

        @media print {
            .no-print-area, .btn { display: none !important; }
            body { background: white; padding: 0; }
            .prova-folha { box-shadow: none; margin: 0; width: 100%; }
            input, textarea { background: transparent !important; }
        }
    </style>
</head>
<body>

<div class="prova-folha" id="documento">
    <div class="cabecalho">
        <table>
            <tr>
                <td colspan="2"><strong>INSTITUIÇÃO:</strong> Escola Bíblica Dominical</td>
            </tr>
            <tr>
                <td><strong>ALUNO(A):</strong> <input type="text" id="nome-aluno" placeholder="Digite seu nome completo"></td>
                <td><strong>DATA:</strong> <input type="date" id="data-prova"></td>
            </tr>
            <tr>
                <td><strong>DISCIPLINA:</strong> Conhecimentos Bíblicos</td>
                <td><strong>NOTA FINAL: <span id="nota-topo">____</span> / 120</strong></td>
            </tr>
        </table>
    </div>

    <h2>Avaliação de Conhecimento Geral</h2>

    <div id="questoes-lista"></div>

    <div id="resultado-final">
        <h3 id="msg-feedback">CORREÇÃO CONCLUÍDA</h3>
        <p>Sua pontuação total baseada nos critérios de clareza e termos-chave foi:</p>
        <h1 id="score-val">0</h1>
    </div>
</div>

<div class="no-print-area">
    <button class="btn btn-save" onclick="processarProva()">Finalizar e Baixar PDF</button>
</div>

<script>
    const perguntasFacis = [
        { t: "A Criação do Mundo", items: ["O que Deus criou no primeiro dia?", "Quem foi o primeiro homem e a primeira mulher?", "Em qual dia Deus descansou?"] },
        { t: "A Arca de Noé", items: ["Por que Noé construiu a arca?", "Quantos de cada animal limpo entraram na arca?", "Qual sinal Deus deu de que não haveria mais dilúvio?"] },
        { t: "Moisés e o Êxodo", items: ["Onde Moisés recebeu os 10 mandamentos?", "Como o povo de Israel atravessou o Mar Vermelho?", "O que caiu do céu para alimentar o povo no deserto?"] },
        { t: "Davi e Golias", items: ["Qual arma Davi usou para derrotar o gigante?", "Qual era a profissão de Davi antes de ser rei?", "Quem era o rei de Israel antes de Davi?"] },
        { t: "Nascimento de Jesus", items: ["Em qual cidade Jesus nasceu?", "Como os magos foram guiados até o bebê?", "Quem era o rei que queria matar Jesus bebê?"] },
        { t: "Milagres e Ensinos", items: ["Qual foi o primeiro milagre de Jesus?", "Quantos pães e peixes foram usados para alimentar a multidão?", "Como Jesus saiu do túmulo após três dias?"] }
    ];

    const lista = document.getElementById('questoes-lista');

    perguntasFacis.forEach((q, i) => {
        let div = document.createElement('div');
        div.className = 'questao';
        div.innerHTML = `<span class="pergunta-titulo">${i+1}. ${q.t}</span>`;
        
        q.items.forEach((item, j) => {
            div.innerHTML += `
                <div class="item-box">
                    <label class="item-label">${String.fromCharCode(97+j)}) ${item}</label>
                    <textarea rows="1" oninput="autoExpand(this)" class="resp" data-q="${i}"></textarea>
                </div>`;
        });
        lista.appendChild(div);
    });

    function autoExpand(field) {
        field.style.height = 'inherit';
        field.style.height = field.scrollHeight + 'px';
    }

    function processarProva() {
        let total = 0;
        const respostas = document.querySelectorAll('.resp');
        
        respostas.forEach(r => {
            const txt = r.value.trim().toLowerCase();
            if (txt.length > 3) {
                total += 4.5; // Base por responder
                // Bônus por explicação (conectivos simples)
                if (txt.includes("porque") || txt.includes("pois") || txt.includes("foi") || txt.includes("através")) {
                    total += 2.16;
                }
            }
        });

        const final = Math.min(Math.round(total), 120);
        document.getElementById('score-val').innerText = final;
        document.getElementById('nota-topo').innerText = final;
        document.getElementById('resultado-final').style.display = 'block';

        // Configuração do PDF
        const element = document.getElementById('documento');
        const opt = {
            margin: [10, 10, 10, 10],
            filename: 'prova_biblica_facil.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
